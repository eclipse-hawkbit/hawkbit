version: 2
updates:
  # Enable version updates for maven
  - package-ecosystem: "maven" 
    # Look for a pom.xml everywhere
    directory: "/"
    # Check daily
    schedule:
      interval: "daily"
  # Enable version updates for docker
  - package-ecosystem: "docker" 
    # Look for Dockerfile in the /docker directory only
    directory: "/docker"
    # Check daily
    schedule:
      interval: "daily"
  # Enable version updates for github actions
  - package-ecosystem: "github-actions"
    directory: "/"
    # Check daily
    schedule:
      interval: "daily"

    # 1.0 release branch
  - package-ecosystem: "maven"
    directory: "/"
    target-branch: "1.0"
    schedule:
      interval: "daily"
  - package-ecosystem: "docker"
    directory: "/docker"
    target-branch: "1.0"
    schedule:
      interval: "daily"
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "1.0"
    schedule:
      interval: "daily"